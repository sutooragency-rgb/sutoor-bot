name: Sutoor Auto News Bot

on:
  schedule:
    # الجدولة: يعمل كل ساعتين (يمكنك تغييرها لاحقاً إذا أردت)
    - cron: '0 */2 * * *'
  # السماح بتشغيل البوت يدوياً من واجهة GitHub
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # تثبيت المكتبات الأساسية مع كاسر الحماية cloudscraper
          pip install requests beautifulsoup4 cloudscraper lxml

      - name: Run Sutoor Auto Publisher
        run: python sutoor_bot.py
